server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    config-url: /v3/api-docs/swagger-config
    urls:
      - name: API Gateway
        url: /v3/api-docs
      - name: Account Service
        url: http://localhost:8081/api/v3/api-docs
      - name: Transaction Service
        url: http://localhost:8082/api/v3/api-docs
      - name: Notification Service
        url: http://localhost:8084/v3/api-docs

spring:
  application:
    name: api-gateway

  data:
    redis:
      host: localhost
      port: 6379
      password: redis123

resilience4j:
  circuitbreaker:
    instances:
      accountService:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10000
        permittedNumberOfCallsInHalfOpenState: 3
      transactionService:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10000
        permittedNumberOfCallsInHalfOpenState: 3

logging:
  level:
    com.labg.gateway: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info