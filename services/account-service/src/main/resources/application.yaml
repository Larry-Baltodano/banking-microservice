server:
  port: 8081
  servlet:
    context-path: /api

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

spring:
  application:
    name: account-service

  datasource:
    url: jdbc:postgresql://localhost:5433/accountdb
    username: admin
    password: secret123
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 600000
      pool-name: AccountHikariPool

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  cache:
    type: redis

  data:
    redis:
      host: localhost
      port: 6379
      password: redis123
      timeout: 60000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

logging:
  level:
    com.labg: DEBUG
    org.springframework.web: INFO
    org.postgresql: DEBUG
    org.springdoc: DEBUG
    io.swagger: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics