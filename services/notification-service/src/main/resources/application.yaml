server:
  port: 8084

springdoc:
  api-docs:
    path: /v3/api-docs

spring:
  application:
    name: notification-service

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: notification-service-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.value.default.type: com.labg.notification.model.TransactionEvent
      auto-offset-reset: earliest

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:test@bank.com}
    password: ${MAIL_PASSWORD:test}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enabled: true

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html

logging:
  level:
    com.labg.notification: DEBUG
    org.springframework.kafka: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info